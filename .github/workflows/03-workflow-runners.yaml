name: 03 - workflow Runners

on: push
 
jobs:
  ubuntu-echo:
    runs-on: ubuntu-latest
    steps:
      - name: show OS
        run: |
          echo "This is running on a Ubuntu runner."
          echo "Runner OS: $Runner_OS"
  windows-echo:
      runs-on: windows-latest
      steps:
       - name: Show OS
         shell: bash
         run: |
           echo "This job is running on a windows runner."
           echo "Runner OS: $RUNNER_OS"
           
         
      
 
          
